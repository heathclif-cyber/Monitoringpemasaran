<section id="bypass-form" class="page-section">
    <div class="mb-8">
        <h3 class="text-2xl font-bold text-slate-800">Input Bypass Laporan</h3>
        <p class="text-slate-500">Gunakan menu ini untuk memasukkan data transaksi langsung ke laporan (insidentil).</p>
    </div>

    <div class="glass-panel p-8 max-w-2xl mx-auto">
        <form id="formBypass" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Unit Produksi</label>
                    <input type="text" name="Unit" id="bypass_unit" placeholder="Contoh: Beteleme" class="form-input" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Komoditi</label>
                    <input type="text" name="Komoditi" id="bypass_komoditi" placeholder="Contoh: Sawit" class="form-input" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tanggal Transaksi</label>
                    <input type="date" name="Tanggal" id="bypass_tanggal" class="form-input" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nominal (Rp)</label>
                    <input type="number" name="Nominal" id="bypass_nominal" placeholder="0" class="form-input" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Mitra Pembeli</label>
                <input type="text" name="Pembeli" id="bypass_pembeli" placeholder="Nama Perusahaan / Pembeli" class="form-input" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Deskripsi Produk / Keterangan</label>
                <textarea name="Deskripsi" id="bypass_deskripsi" rows="3" placeholder="Contoh: Tandan Buah Segar" class="form-input"></textarea>
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                <button type="reset" class="px-6 py-2 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">
                    Reset
                </button>
                <button type="submit" class="px-8 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 shadow-lg shadow-brand-200 transition-all">
                    Simpan Data
                </button>
            </div>
        </form>
    </div>
</section>

<script>
document.getElementById('formBypass').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const response = await fetch('/api/laporan/create-bypass', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.success) {
            showNotification('Data bypass berhasil disimpan!', 'success');
            e.target.reset();
            // Refresh dashboard data if we are on dashboard later
            if (window.fetchDashboardData) fetchDashboardData();
        } else {
            showNotification('Gagal: ' + result.message, 'error');
        }
    } catch (err) {
        showNotification('Terjadi kesalahan sistem', 'error');
    }
});
</script>
