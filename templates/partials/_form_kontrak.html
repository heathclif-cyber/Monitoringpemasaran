            <!-- Kontrak Form Section -->
            <section id="kontrak-form" class="page-section max-w-full mx-auto">
                <!-- Two-pane layout: form left, preview right -->
                <div class="flex gap-6 items-start">
                    <!-- ===== FORM PANEL ===== -->
                    <div class="flex-1 glass-panel p-6 min-w-0">
                        <div class="flex items-center justify-between mb-5 pb-4 border-b border-slate-100">
                            <div>
                                <h2 class="text-lg font-bold text-slate-800">Buat Kontrak Baru</h2>
                                <p class="text-xs text-slate-500 mt-0.5">Isi semua kolom · Preview muncul di kanan setelah simpan</p>
                            </div>
                        </div>

                        <form id="formCreateKontrak" onsubmit="handleKontrakSubmit(event)">
                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <!-- Kolom 1 -->
                                <div class="space-y-3">
                                    <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2">Data Dasar</h3>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">No Kontrak *</label><input type="text" id="k_no_kontrak" list="kontrak-list" required class="form-input" onchange="autoLoadKontrak()" autocomplete="off"><datalist id="kontrak-list"></datalist></div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Tanggal *</label><input type="date" id="k_tanggal_kontrak" required class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Lokasi</label><input type="text" id="k_lokasi" class="form-input" value="Makassar"></div>
                                    </div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Status</label><select id="k_status" class="form-input"><option value="Draft">Draft</option><option value="Active">Active</option></select></div>
                                    
                                    <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider pt-2 mb-2">Para Pihak</h3>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Pembeli *</label><input type="text" id="k_pembeli" required class="form-input"></div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Nama Direktur Pembeli</label><input type="text" id="k_nama_direktur" class="form-input"></div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Alamat Pembeli</label><textarea id="k_alamat_pembeli" class="form-input" rows="2"></textarea></div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Penjual</label><textarea id="k_penjual" class="form-input" rows="2">PT Perkebunan Nusantara I Regional 8</textarea></div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Pemilik Komoditas</label><input type="text" id="k_pemilik_komoditas" class="form-input" value="PT Perkebunan Nusantara I Regional 8"></div>
                                </div>
                                
                                <!-- Kolom 2 -->
                                <div class="space-y-3">
                                    <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2">Data Barang & Produksi</h3>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Komoditi</label><input type="text" id="k_komoditi" class="form-input" value="Kelapa"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Jenis Komoditi</label><input type="text" id="k_jenis_komoditi" class="form-input"></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Deskripsi Produk</label><input type="text" id="k_deskripsi_produk" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Tahun Panen</label><input type="text" id="k_tahun_panen" class="form-input"></div>
                                    </div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Kebun Produsen</label><input type="text" id="k_kebun_produsen" class="form-input"></div>
                                    
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Volume *</label><input type="number" step="0.01" id="k_volume" required class="form-input" oninput="calculateKontrakPreview()"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Satuan</label><input type="text" id="k_satuan" class="form-input" value="Butir"></div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <div class="col-span-2"><label class="block text-xs font-medium text-slate-700 mb-1">Harga Satuan (Rp) *</label><input type="number" id="k_harga_satuan" required class="form-input" oninput="calculateKontrakPreview()"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">PPN (%)</label><input type="number" step="0.1" id="k_ppn_persen" class="form-input" value="11" oninput="calculateKontrakPreview()"></div>
                                    </div>
                                    <div><label class="block text-xs font-medium text-slate-700 mb-1">Premi (Rp)</label><input type="number" id="k_premi" class="form-input" value="0" oninput="calculateKontrakPreview()"></div>
                                    
                                    <div class="grid grid-cols-3 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Mutu</label><input type="text" id="k_mutu" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Packaging</label><input type="text" id="k_packaging" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Simbol</label><input type="text" id="k_simbol" class="form-input"></div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Chop</label><input type="text" id="k_chop" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Pack Qty</label><input type="number" id="k_pack_qty" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Bale/Karung</label><input type="number" id="k_banyak_bale" class="form-input"></div>
                                    </div>
                                </div>
                                
                                <!-- Kolom 3 -->
                                <div class="space-y-3">
                                    <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2">Ketentuan</h3>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Kondisi Penyerahan</label><input type="text" id="k_kondisi_penyerahan" class="form-input" value="Netto tanpa Pembungkus"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Waktu Penyerahan</label><input type="text" id="k_waktu_penyerahan" class="form-input"></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Levering</label><input type="text" id="k_levering" class="form-input"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Pelabuhan Muat</label><input type="text" id="k_pelabuhan_muat" class="form-input"></div>
                                    </div>
                                    
                                    <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider pt-2 mb-2">Pembayaran</h3>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Top (Hari)</label><input type="number" id="k_lama_pembayaran_hari" class="form-input" value="15"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Pengambilan (Hari)</label><input type="number" id="k_penyerahan_hari" class="form-input" value="15"></div>
                                    </div>
                                    <div class="grid grid-cols-3 gap-2">
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Metode</label><input type="text" id="k_pembayaran_metode" class="form-input" value="Tunai"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Cara</label><input type="text" id="k_pembayaran_cara" class="form-input" value="Transfer"></div>
                                        <div><label class="block text-xs font-medium text-slate-700 mb-1">Nama Bank</label><input type="text" id="k_pembayaran_bank" class="form-input" value="Bank Rakyat Indonesia"></div>
                                    </div>
                                    
                                    <div class="bg-brand-50 rounded-lg p-4 mt-2 border border-brand-100 space-y-1.5">
                                        <h4 class="text-xs font-semibold text-brand-700 mb-1">Kalkulasi Cepat</h4>
                                        <div class="flex justify-between text-xs"><span class="text-slate-600">Nilai Transaksi:</span><span class="font-bold text-slate-800" id="k_preview_nilai">Rp 0</span></div>
                                        <div class="flex justify-between text-xs"><span class="text-slate-600">Nominal PPN:</span><span class="font-bold text-slate-800" id="k_preview_ppn">Rp 0</span></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-6 pt-4 border-t border-slate-100 flex justify-end gap-3">
                                <button type="button" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm font-medium transition-colors" onclick="document.getElementById('formCreateKontrak').reset(); calculateKontrakPreview();">Reset</button>
                                <button type="submit" class="px-5 py-2 rounded-lg bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium shadow-sm transition-colors flex items-center gap-2">
                                    <i class="fas fa-save"></i> Simpan & Preview
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- ===== PREVIEW PANEL ===== -->
                    <div class="w-[420px] shrink-0 sticky top-0">
                        <div class="glass-panel overflow-hidden">
                            <div class="bg-slate-700 px-4 py-3 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-file-word text-blue-300 text-sm"></i>
                                    <span class="text-white text-sm font-medium">Preview Dokumen</span>
                                </div>
                                <button id="btn-export-preview" onclick="exportKontrakFromPreview()" class="hidden flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded-md transition-colors">
                                    <i class="fas fa-file-word"></i> Download .docx
                                </button>
                            </div>
                            <div id="kontrak-preview-panel" class="overflow-auto" style="max-height:80vh;">
                                <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                                    <i class="fas fa-file-alt text-4xl mb-3 text-slate-300"></i>
                                    <p class="text-sm">Simpan kontrak untuk melihat preview</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
