<section id="do-form" class="page-section max-w-[1600px] mx-auto space-y-8 pb-8 pt-24">
                <div class="flex gap-6 items-start">
                    <div class="flex-1 glass-panel p-6 min-w-0">
                        <form id="formCreateDO" onsubmit="handleDOSubmit(event)" class="mt-2">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <!-- Kolom 1 -->
                            <div class="space-y-3">
                                <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2">Data Dokumen</h3>
                                
                                <div class="relative">
                                    <label class="block text-xs font-medium text-slate-700 mb-1">Pilih No Invoice *</label>
                                    <select id="d_no_invoice" required class="form-input border-brand-300 focus:border-brand-500 focus:ring-brand-500" onchange="fetchInvoiceForDO()">
                                        <option value="">-- Pilih Invoice --</option>
                                    </select>
                                    <p class="text-xs text-slate-400 mt-1">Pilih invoice untuk referensi DO.</p>
                                </div>
                                
                                <div>
                                    <label class="block text-xs font-medium text-slate-700 mb-1">No DO *</label>
                                    <input type="text" id="d_no_do" list="do-list" required class="form-input" onchange="autoLoadDO()" autocomplete="off" placeholder="DO-2026-0001">
                                    <datalist id="do-list"></datalist>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-700 mb-1">Tgl DO *</label>
                                        <input type="date" id="d_tanggal_do" required class="form-input">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-700 mb-1">Kepada Unit</label>
                                        <input type="text" id="d_kepada_unit" list="unit-list" class="form-input">
                                    </div>
                                </div>
                                <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2 mt-4">Data Pembayaran</h3>
                                <div class="grid grid-cols-2 gap-2">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-700 mb-1">Tgl Pembayaran</label>
                                        <input type="date" id="d_tanggal_pembayaran" class="form-input">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-700 mb-1">Nominal Transfer</label>
                                        <input type="number" id="d_nominal_transfer" class="form-input" value="0">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Kolom 2: Summary -->
                            <div class="space-y-3">
                                <h3 class="text-xs font-semibold text-brand-600 uppercase tracking-wider mb-2">Data Riwayat Invoice & Kontrak</h3>
                                <div class="bg-brand-50 rounded-lg p-4 border border-brand-100 space-y-1.5">
                                    <div class="flex justify-between text-xs"><span class="text-slate-600">No Kontrak:</span><span class="font-medium text-slate-800 text-right" id="d_lbl_kontrak">-</span></div>
                                    <div class="flex justify-between text-xs"><span class="text-slate-600">Pembeli:</span><span class="font-medium text-slate-800 text-right" id="d_lbl_pembeli">-</span></div>
                                    <div class="flex justify-between text-xs"><span class="text-slate-600">Komoditi:</span><span class="font-medium text-slate-800 text-right" id="d_lbl_komoditi">-</span></div>
                                    <div class="flex justify-between text-xs"><span class="text-slate-600">Volume:</span><span class="font-medium text-slate-800 text-right" id="d_lbl_volume">-</span></div>
                                    
                                    <div class="flex justify-between text-xs mt-3 pt-3 border-t border-brand-200">
                                        <span class="text-slate-700 font-bold uppercase tracking-wide">Lunas Dibayar (Inv):</span>
                                        <span class="font-bold text-brand-700 text-sm" id="d_lbl_total">Rp 0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 pt-4 border-t border-slate-100 flex justify-end gap-3">
                            <button type="button" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm font-medium transition-colors" onclick="document.getElementById('formCreateDO').reset(); buildDOPreview();">Reset</button>
                            <button type="submit" id="btn-submit-do" class="px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium shadow-sm transition-colors flex items-center gap-2">
                                <i class="fas fa-truck-fast"></i> Terbitkan DO
                            </button>
                        </div>
                    </form>
                    </div>
                    <!-- DO PREVIEW PANEL -->
                    <div class="w-[420px] shrink-0 sticky top-0">
                        <div class="glass-panel overflow-hidden">
                            <div class="bg-slate-700 px-4 py-3 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-truck text-blue-300 text-sm"></i>
                                    <span class="text-white text-sm font-medium">Preview DO</span>
                                </div>
                            </div>
                            <div id="do-preview-panel" class="overflow-auto bg-slate-50" style="max-height:80vh;">
                                <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                                    <i class="fas fa-truck text-4xl mb-3 text-slate-300"></i>
                                    <p class="text-sm">Pilih Form dan isi data untuk melihat preview</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
